<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Paintings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html"><strong>Linya Li</strong> 李琳娅</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Work</a></li>
      <li><a href="poems.html">Poems</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>

    <!-- ── Hero image ─────────────────────────────────────── -->
    <div class="gallery-hero" id="gallery-hero">
      <!--
        TO ADD YOUR PAINTINGS:
        1. Place your image files in the images/ folder.
        2. Change the src attributes below to match your filenames,
           e.g. src="images/my-painting.jpg"
        3. Update the data-title and data-caption attributes on each
           dot button to match each painting's info.
      -->
      <img
        class="hero-slide active"
        src="images/swallowed.jpg"
        alt="Swallowed"
      />
      <button class="hero-arrow hero-arrow-left" id="prev-btn" aria-label="Previous painting">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="hero-arrow hero-arrow-right" id="next-btn" aria-label="Next painting">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- ── Caption ────────────────────────────────────────── -->
    <div class="gallery-caption">
      <h2 id="hero-title">Swallowed</h2>
      <p id="hero-caption">Oil on canvas, 20x24in, 2026</p>
    </div>

    <!-- ── Dots ───────────────────────────────────────────── -->
    <!-- Each button: set data-src, data-title, data-caption to match your painting -->
    <div class="gallery-dots" id="dots">
      <button class="dot active" data-src="images/swallowed.jpg" data-title="Swallowed" data-caption="Oil on canvas, 20x24in, 2026"      aria-label="Painting 1"></button>
      <button class="dot"        data-src="images/escaped.jpeg"  data-title="Escaped"   data-caption="Oil on canvas, 20x24in, 2026"      aria-label="Painting 2"></button>
      <button class="dot"        data-src="images/two.jpg"       data-title="Two"       data-caption="Oil, paper on canvas, 20x24in, 2026" aria-label="Painting 3"></button>
    </div>

  </main>

<script src="js/main.js"></script>
</body>
</html>
