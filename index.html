<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Paintings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html"><strong>Linya Li</strong> 李琳娅</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Work</a></li>
      <li><a href="poems.html">Poems</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>

    <!-- ── Hero image ─────────────────────────────────────── -->
    <div class="gallery-hero-wrapper">
      <button class="hero-arrow" id="prev-btn" aria-label="Previous painting">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="gallery-hero" id="gallery-hero">
        <!--
          TO ADD YOUR PAINTINGS:
          1. Place your image files in the images/ folder.
          2. Change the src attributes below to match your filenames,
             e.g. src="images/my-painting.jpg"
          3. Update the data-title and data-caption attributes on each
             dot button to match each painting's info.
        -->
        <img
          class="hero-slide active"
          src="https://placehold.co/1100x830/e0ddd8/6b6b6b?text=Your+Painting+Here"
          alt="Featured painting"
        />
      </div>

      <button class="hero-arrow" id="next-btn" aria-label="Next painting">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- ── Caption ────────────────────────────────────────── -->
    <div class="gallery-caption">
      <h2 id="hero-title">Painting Title</h2>
      <p id="hero-caption">Medium · Year</p>
    </div>

    <!-- ── Dots ───────────────────────────────────────────── -->
    <!-- Each button: set data-src, data-title, data-caption to match your painting -->
    <div class="gallery-dots" id="dots">
      <button class="dot active" data-src="https://placehold.co/1100x830/e0ddd8/6b6b6b?text=Your+Painting+Here" data-title="Painting Title"   data-caption="Medium · Year"         aria-label="Painting 1"></button>
      <button class="dot"        data-src="https://placehold.co/1100x830/d4cfc9/6b6b6b?text=Painting+2"         data-title="Second Painting"  data-caption="Oil on canvas · 2024"   aria-label="Painting 2"></button>
      <button class="dot"        data-src="https://placehold.co/1100x830/ccc5bc/6b6b6b?text=Painting+3"         data-title="Third Painting"   data-caption="Watercolor · 2023"      aria-label="Painting 3"></button>
      <button class="dot"        data-src="https://placehold.co/1100x830/bfb9b0/6b6b6b?text=Painting+4"         data-title="Fourth Painting"  data-caption="Acrylic · 2023"         aria-label="Painting 4"></button>
      <button class="dot"        data-src="https://placehold.co/1100x830/b3aca2/6b6b6b?text=Painting+5"         data-title="Fifth Painting"   data-caption="Gouache · 2022"         aria-label="Painting 5"></button>
    </div>

  </main>

<script src="js/main.js"></script>
</body>
</html>
